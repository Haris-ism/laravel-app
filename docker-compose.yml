services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    restart: unless-stopped
    environment:
      APP_NAME: Laravel
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost
      # Generate with: php artisan key:generate --show
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: laravel_db
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      SESSION_DRIVER: file
      CACHE_STORE: file
      LOG_CHANNEL: stderr
    volumes:
      - laravel_storage:/var/www/html/storage
      - laravel_public:/var/www/html/public
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - laravel

  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - laravel_public:/var/www/html/public:ro
    depends_on:
      - app
    networks:
      - laravel

  postgres:
    image: postgres:16-alpine
    container_name: laravel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: laravel_db
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel -d laravel_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - laravel

networks:
  laravel:
    driver: bridge

volumes:
  postgres_data:
  laravel_storage:
  laravel_public:
